# Serbero sample configuration.
#
# Usage:
# 1. Copy this file to `config.toml`
# 2. Replace the placeholder hex keys / relay URLs / solver pubkeys
# 3. Export secrets through environment variables instead of committing them
#
# The daemon loads `./config.toml` by default, or the path set in
# `SERBERO_CONFIG`.

[serbero]
# Hex-encoded Nostr private key for the Serbero daemon identity.
# Production deployments should prefer `SERBERO_PRIVATE_KEY`.
private_key = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# SQLite database path. Can be overridden with `SERBERO_DB_PATH`.
db_path = "serbero.db"

# Tracing log level / filter. Can be overridden with `SERBERO_LOG`.
log_level = "info"

[mostro]
# Hex-encoded public key of the Mostro instance to monitor.
pubkey = "abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"

[[relays]]
url = "wss://relay.example.com"

# Add as many relays as needed.
[[relays]]
url = "wss://relay.backup.example.com"

# Solvers notified for dispute events.
# `permission` is parsed today and becomes more relevant in later phases.
[[solvers]]
pubkey = "1111111111111111111111111111111111111111111111111111111111111111"
permission = "read"

[[solvers]]
pubkey = "2222222222222222222222222222222222222222222222222222222222222222"
permission = "write"

[timeouts]
# Re-notify disputes left in `notified` state for this long.
renotification_seconds = 300

# How often to scan for unattended disputes.
renotification_check_interval_seconds = 60

# ---------------------------------------------------------------------------
# Phase 3: guided mediation
# Omit or keep disabled to run only Phase 1 / 2 behavior.
# ---------------------------------------------------------------------------

[mediation]
enabled = false

# Maximum mediation rounds before `round_limit` escalation.
max_rounds = 2

# Escalate if a party does not respond within this many seconds.
# Set to 0 to disable the timeout sweep.
party_response_timeout_seconds = 1800

# Solver-auth revalidation loop.
solver_auth_retry_initial_seconds = 60
solver_auth_retry_max_interval_seconds = 3600
solver_auth_retry_max_total_seconds = 86400
solver_auth_retry_max_attempts = 24

# ---------------------------------------------------------------------------
# [reasoning] — the AI provider that classifies disputes and drafts
# clarifying messages during Phase 3 guided mediation.
#
# Phase 3 is OPT-IN. If you only want Phase 1/2 (dispute detection +
# solver notification), leave `[mediation].enabled = false` above and
# this whole block can stay disabled.
#
# To turn Phase 3 on you need TWO things:
#   1. `[mediation].enabled = true` (the feature flag above)
#   2. `[reasoning].enabled = true` plus a working API endpoint here
#
# Pick ONE provider profile below. The simplest path for most users
# is PPQ.ai — see "Profile A" right after this comment.
# ---------------------------------------------------------------------------

[reasoning]
# Master switch. Set to `true` and fill in the rest of the block.
enabled = false

# Which adapter to use. Valid values:
#
#   "openai"            — hosted OpenAI (api.openai.com) and any
#                         server speaking the same wire format.
#   "openai-compatible" — exact same adapter as "openai"; use this
#                         label when you point at PPQ.ai, vLLM,
#                         llama.cpp, Ollama, LiteLLM, OpenRouter,
#                         Azure OpenAI, etc. — anything exposing
#                         POST {api_base}/chat/completions.
#   "anthropic"         — native Anthropic Messages API (Claude).
#                         No proxy needed for Claude models.
#
# The strings "ppqai" and "openclaw" exist in the code as reserved
# names, but they DO NOT WORK — they fail loudly on purpose. To use
# PPQ.ai, set provider = "openai-compatible" (see Profile A below).
provider = "openai"

# Which model to use. The exact string depends on the provider.
# The defaults below match `provider = "openai"`.
model = "gpt-5"

# Where the HTTP client points. The adapter appends `/chat/completions`
# (OpenAI-style) or `/v1/messages` (Anthropic) to this URL.
api_base = "https://api.openai.com/v1"

# Name of the environment variable that holds your API key.
# Serbero never reads the key from this TOML — only from the
# environment — so the file is safe to commit.
#
# Example shell setup:
#   export SERBERO_REASONING_API_KEY="sk-...your-real-key..."
#
# You can rename this variable to fit your secrets pipeline; whatever
# string you put here must match the exported env var.
api_key_env = "SERBERO_REASONING_API_KEY"

# Per-HTTP-call timeout (≥ 1 s) and bounded retry budget. `1` means
# "one retry on a transient failure" — the adapter owns the budget,
# so this is the entire retry surface for a single reasoning call.
request_timeout_seconds = 30
followup_retry_count = 1

# ===========================================================================
# Profile A — PPQ.ai (recommended, easiest hosted option)
# ===========================================================================
# PPQ.ai is an OpenAI-compatible aggregator that fronts dozens of
# upstream models (OpenAI, Anthropic, Google, Mistral, DeepSeek, …)
# behind a single endpoint and a single API key. You pay PPQ.ai;
# they handle the upstream provider relationships.
#
# Sign up: https://ppq.ai     ·     API docs: https://ppq.ai/api-docs
#
# To use PPQ.ai, REPLACE the [reasoning] block above with:
#
#   [reasoning]
#   enabled     = true
#   provider    = "openai-compatible"
#   api_base    = "https://api.ppq.ai"
#   api_key_env = "SERBERO_REASONING_API_KEY"
#   model       = "autoclaw"
#   request_timeout_seconds = 30
#   followup_retry_count    = 1
#
# Then export your PPQ.ai key under that env var:
#   export SERBERO_REASONING_API_KEY="your-ppq-key"
#
# Notes:
# - `api_base` is the BARE HOST, with no `/v1` suffix. PPQ.ai does
#   not version its endpoint; appending `/v1` produces a 404.
# - `model = "autoclaw"` is PPQ.ai's auto-router (it picks an
#   upstream model for you). Other useful bare names include:
#     "auto", "claude-sonnet-4.6", "claude-opus-4.7",
#     "claude-haiku-4.5", "gpt-5.4", "gemini-3-flash-preview".
#   Most other models use a vendor prefix, e.g.:
#     "openai/gpt-5", "openai/gpt-4o-mini",
#     "anthropic/claude-sonnet-4.5", "google/gemini-2.5-flash",
#     "deepseek/deepseek-v3.2", "x-ai/grok-4".
#
# - To get the AUTHORITATIVE current model list, run:
#     curl -s https://api.ppq.ai/v1/models \
#       -H "Authorization: Bearer $SERBERO_REASONING_API_KEY" \
#       | jq '.data[].id' | sort
#   Use any ID from that list verbatim as `model`. If a name
#   produces `400 "<name> is not a valid model ID"`, it's gone or
#   was renamed — pick a replacement from the list.

# ===========================================================================
# Profile B — Native Anthropic (Claude) API
# ===========================================================================
# Use this if you have an anthropic.com account and want to call
# Claude directly with no proxy. To use it, REPLACE the [reasoning]
# block above with:
#
#   [reasoning]
#   enabled     = true
#   provider    = "anthropic"
#   api_base    = "https://api.anthropic.com"
#   api_key_env = "ANTHROPIC_API_KEY"
#   model       = "claude-3-5-sonnet-20241022"
#   request_timeout_seconds = 30
#   followup_retry_count    = 1
#
# Then export your Anthropic key:
#   export ANTHROPIC_API_KEY="sk-ant-...your-real-key..."
#
# The adapter appends `/v1/messages` to `api_base` and sends the
# `x-api-key` and `anthropic-version` headers automatically.

# ===========================================================================
# Profile C — Self-hosted (vLLM, llama.cpp, Ollama, LiteLLM, …)
# ===========================================================================
# Anything exposing OpenAI's `/chat/completions` shape works without
# code changes. Example for a local Ollama:
#
#   [reasoning]
#   enabled     = true
#   provider    = "openai-compatible"
#   api_base    = "http://localhost:11434/v1"
#   api_key_env = "SERBERO_REASONING_API_KEY"   # any non-empty value
#   model       = "llama3.1:8b"
#   request_timeout_seconds = 30
#   followup_retry_count    = 1
#
# Most local servers ignore the API key but still require one to be
# present — export any non-empty string.

[prompts]
# Default prompt bundle paths shipped in this repository.
system_instructions_path = "./prompts/phase3-system.md"
classification_policy_path = "./prompts/phase3-classification.md"
escalation_policy_path = "./prompts/phase3-escalation-policy.md"
mediation_style_path = "./prompts/phase3-mediation-style.md"
message_templates_path = "./prompts/phase3-message-templates.md"

[chat]
# Inbound Mostro chat polling interval used by the mediation engine.
inbound_fetch_interval_seconds = 10

# --- Phase 4: escalation execution surface (FR-215) ---
# Consumes Phase 3's handoff_prepared audit events and dispatches
# a structured DM to write-permission solvers. See
# specs/004-escalation-execution/contracts/config.md for the full
# shape.
[escalation]
# Feature flag. `true` spawns the Phase 4 dispatcher task; `false`
# keeps Phase 4 entirely inert (no task, no writes, no Phase 1/2/3
# behavior change). Default: false — Phase 4 is opt-in.
enabled = false

# Scan cadence. Positive integer seconds. The SC-201 target (95% of
# handoffs delivered within 60 s) assumes the default 30 here;
# larger values degrade delivery latency linearly.
dispatch_interval_seconds = 30

# When zero solvers with `permission = "write"` are configured:
#   true  → broadcast the handoff DM to every configured solver
#           regardless of permission.
#   false → refuse to broadcast and record an
#           `escalation_dispatch_unroutable` audit event + ERROR log
#           line. The handoff stays pending so a later config
#           change (adding a write solver) re-surfaces it.
# Operators running intentionally read-only deployments must opt in
# explicitly by flipping this to true.
fallback_to_all_solvers = false
